<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nav">
        <a href="#" class="LinkNav">Home</a>
        <a href="#" class="LinkNav">Sobre</a>
        <a href="#" class="LinkNav">Contato</a>
    </div>
    <div class="containerLogin">
        <h1>Login</h1>
        <form action="" method="post">
            <div class="div-input-sublinhado">
                <img src="email.png" alt="email" class="IconInput">
                <input type="text" name="username" placeholder="Usuário" class="input-sublinhado">
            </div>
            <div class="div-input-sublinhado">
                <img src="lock.png" alt="email" class="IconInput" id="locker">
                <input type="password" name="password" placeholder="Password" class="input-sublinhado">
            </div>
            <button>Entrar</button>
            <div class="DivLinksLogin">
                <a href="#" class="LinksLogin" id="LinkEsqueciMinhaSenha">Esqueci minha senha</a>
                <a href="#" class="LinksLogin" id="LinkCriarConta">Criar conta</a>
            </div>
        </form>
    </div>
</body>
</html>
