<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="ContainerConta">
        <section id="ContainerForm">
            <header>
                <h1>Criar Conta</h1>
            </header>
            <form id="registerForm">
                <input type="email" name="Email" placeholder="E-mail" required>
                <input type="text" name="FirstName" placeholder="Primeiro Nome">
                <input type="text" name="LastName" placeholder="Segundo Nome">
                <input type="text" name="TaxPayerId" placeholder="CPF">
                <input type="text" name="PhoneNumber" placeholder="Telefone">
                <input type="password" name="Password" placeholder="Senha">
                <button type="submit">Cadastrar</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
