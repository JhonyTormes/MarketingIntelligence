<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside>
        <ul>
            <li id="list-item-rastreamento"><a href="">Rastreamento de links</a></li>
        </ul>
    </aside>
    <main>
        <form action="" id="create-link-form">
            <input type="text" name="Original-Url" placeholder="Cole a URL original aqui">
            <input type="text" name="Campaign-Name" placeholder="Nome da Campanha">
            <button type="submit">Encurtar</button>
        </form>
        <table id="links-table">
            <thead>
                <th>Campanha</th>
                <th>URL Original</th>
                <th>URL Curta</th>
                <th>Cliques</th>
            </thead>
            <tbody id="links-table-body">

            </tbody>
        </table>
    </main>
    <script src="script.js"></script>
</body>
</html>
